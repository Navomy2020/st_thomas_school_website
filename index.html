<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Thomas LP School, Kangazha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="header-container">
            <button class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="logo-container">
                <div class="logo-icon">ST</div>
                <div class="logo-text">
                    <h1>ST. THOMAS LP SCHOOL</h1>
                    <p>KANGAZHA</p>
                </div>
            </div>
        </div>

        <nav class="nav-links">
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#academics">Academics</a></li>
                <li><a href="#stats">At A Glance</a></li>
                <li><a href="#facilities">Facilities</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="about">

        <div class="hero-content">

            <h2>Reach Higher.<br><span class="highlight">Dream Bigger.</span>
            </h2>
            <p>Empowering children to learn, explore and succeed through quality primary education.</p>
            <div class="hero-cta">
                <a href="#contact" class="btn-primary">Contact us</a>
                <a href="#stats" class="btn-secondary">View Location</a>
            </div>

        </div>
    </section>

</body>
<script>

    const menuBtn = document.querySelector(".menu-btn");
    const navLinks = document.querySelector(".nav-links");

    menuBtn.addEventListener("click", () => {
        console.log("Menu button clicked");
        navLinks.classList.toggle("show");

        const icon = menuBtn.querySelector("i");

        if (navLinks.classList.contains("show")) {
            icon.classList.remove("fa-bars");
            icon.classList.add("fa-xmark");
        }
        else {
            icon.classList.remove("fa-xmark");
            icon.classList.add("fa-bars");
        }
    });

</script>

</html>
